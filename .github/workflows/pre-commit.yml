name: Package install

on:
  pull_request:
  workflow_dispatch:
    inputs:
      runner:
        description: Runner pool for manual install checks.
        required: true
        type: choice
        default: local
        options:
          - local
          - github-hosted

permissions:
  contents: read

jobs:
  package-install:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.runner == 'local' }}
    runs-on: [self-hosted, Linux, ARM64, packagemaze-linux-local]
    name: Install Python package dependencies
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - run: python -m pip install --upgrade poetry
      - run: poetry install

  package-install-github-hosted:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.runner == 'github-hosted' }}
    runs-on: ubuntu-latest
    name: Install Python package dependencies on GitHub-hosted
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - run: python -m pip install --upgrade poetry
      - run: poetry install
