name: Release Python package

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    name: Builds and publishes release.
    permissions:
      id-token: write
      contents: read
      attestations: write
    env:
      PACKAGE_MAZE_PYPI_FEED: ${{ vars.PACKAGE_MAZE_PYPI_FEED }}
      PACKAGE_MAZE_PYPI_FEED_URL: ${{ vars.PACKAGE_MAZE_PYPI_FEED_URL }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - name: Check PackageMaze publish configuration
        run: |
          if [ -z "$PACKAGE_MAZE_PYPI_FEED" ] || [ -z "$PACKAGE_MAZE_PYPI_FEED_URL" ]; then
            printf '%s\n' 'Set PACKAGE_MAZE_PYPI_FEED and PACKAGE_MAZE_PYPI_FEED_URL repository variables before running PackageMaze publish.' >&2
            exit 1
          fi
          case "$PACKAGE_MAZE_PYPI_FEED_URL" in
            https://*) ;;
            *)
              printf '%s\n' 'PACKAGE_MAZE_PYPI_FEED_URL must be an https PackageMaze PyPI Feed Base URL.' >&2
              exit 1
              ;;
          esac

      - uses: packagemaze/setup-maze@v0.0.1

      - name: Authorize PackageMaze installs
        id: packagemaze-install-token
        run: maze auth exchange-oidc --feed "$PACKAGE_MAZE_PYPI_FEED" --purpose install --format github-output

      - name: Configure pip for PackageMaze
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          from urllib.parse import urlsplit

          feed_url = os.environ["PACKAGE_MAZE_PYPI_FEED_URL"].rstrip("/")
          host = urlsplit(feed_url).hostname
          if not host:
              raise SystemExit("PACKAGE_MAZE_PYPI_FEED_URL must include a host")

          netrc = Path.home() / ".netrc"
          netrc.write_text(
              f"machine {host} login __token__ password {os.environ['PACKAGE_MAZE_INSTALL_TOKEN']}\n",
              encoding="utf-8",
          )
          netrc.chmod(0o600)

          with Path(os.environ["GITHUB_ENV"]).open("a", encoding="utf-8") as github_env:
              github_env.write(f"PIP_INDEX_URL={feed_url}/simple/\n")
              github_env.write("PIP_EXTRA_INDEX_URL=\n")
              github_env.write("PIP_NO_INPUT=1\n")
              github_env.write("PIP_DISABLE_PIP_VERSION_CHECK=1\n")
          PY
        env:
          PACKAGE_MAZE_INSTALL_TOKEN: ${{ steps.packagemaze-install-token.outputs.token }}

      - name: Install Poetry
        run: python -m pip install --upgrade poetry

      - name: Extract name from poetry
        run: |
          echo release_name=$(poetry version | grep -o '^[^ ]*') >> $GITHUB_ENV

      - name: Extract version from poetry
        run: |
          echo release_version=$(poetry version -s) >> $GITHUB_ENV

      - name: Make sure version matches GITHUB_REF
        run: test "refs/tags/v${{ env.release_version }}" == "$GITHUB_REF"

      - name: Build distributions
        run: poetry build -f wheel

      - name: Generate wheel artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: dist/*.whl

      - name: Authorize PackageMaze publish
        id: packagemaze-publish-token
        run: maze auth exchange-oidc --feed "$PACKAGE_MAZE_PYPI_FEED" --purpose publish --package "$release_name" --format github-output

      - name: Publish package to PackageMaze
        run: |
          poetry config repositories.packagemaze "${PACKAGE_MAZE_PYPI_FEED_URL%/}/legacy/"
          poetry publish --repository packagemaze
        env:
          POETRY_HTTP_BASIC_PACKAGEMAZE_USERNAME: __token__
          POETRY_HTTP_BASIC_PACKAGEMAZE_PASSWORD: ${{ steps.packagemaze-publish-token.outputs.token }}

      - name: Verify PackageMaze package installs
        run: |
          python -m venv venv/packagemaze-installation
          venv/packagemaze-installation/bin/pip install --no-deps "${release_name}==${release_version}"
