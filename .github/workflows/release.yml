name: Release Python package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    if: ${{ !endsWith(github.ref_name, '-install-benchmark') }}
    runs-on: ubuntu-latest
    name: Builds and publishes release.
    permissions:
      id-token: write
      contents: read
      attestations: write
    env:
      PACKAGE_MAZE_PYPI_FEED: packagemaze/pypi-smoke-test
      PACKAGE_MAZE_PYPI_FEED_URL: https://pkg.packagemaze.com/packagemaze/pypi-smoke-test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - name: Check PackageMaze publish configuration
        run: |
          if [ -z "$PACKAGE_MAZE_PYPI_FEED" ] || [ -z "$PACKAGE_MAZE_PYPI_FEED_URL" ]; then
            printf '%s\n' 'Set PACKAGE_MAZE_PYPI_FEED and PACKAGE_MAZE_PYPI_FEED_URL before running PackageMaze publish.' >&2
            exit 1
          fi
          case "$PACKAGE_MAZE_PYPI_FEED_URL" in
            https://*) ;;
            *)
              printf '%s\n' 'PACKAGE_MAZE_PYPI_FEED_URL must be an https PackageMaze PyPI Feed Base URL.' >&2
              exit 1
              ;;
          esac

      - name: Set up my CI to install from PackageMaze
        id: packagemaze-install-token
        uses: packagemaze/setup-maze@v0.0.2
        with:
          feed: ${{ env.PACKAGE_MAZE_PYPI_FEED }}
          purpose: install

      - name: Install Poetry
        run: python -m pip install --upgrade poetry
        env:
          PIP_INDEX_URL: https://__token__:${{ steps.packagemaze-install-token.outputs.token }}@pkg.packagemaze.com/packagemaze/pypi-smoke-test/simple/

      - name: Extract package metadata from Poetry
        id: package-metadata
        run: |
          release_name="$(poetry version | grep -o '^[^ ]*')"
          release_version="$(poetry version -s)"
          echo "release_name=${release_name}" >> "$GITHUB_ENV"
          echo "release_version=${release_version}" >> "$GITHUB_ENV"
          echo "package-name=${release_name}" >> "$GITHUB_OUTPUT"
          echo "package-version=${release_version}" >> "$GITHUB_OUTPUT"

      - name: Make sure version matches GITHUB_REF
        run: test "refs/tags/v${{ env.release_version }}" == "$GITHUB_REF"

      - name: Build distributions
        run: poetry build -f wheel

      - name: Generate wheel artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: dist/*.whl

      - name: Authorize PackageMaze publish
        id: packagemaze-publish-token
        uses: packagemaze/setup-maze@v0.0.2
        with:
          feed: ${{ env.PACKAGE_MAZE_PYPI_FEED }}
          purpose: publish
          package: ${{ steps.package-metadata.outputs.package-name }}

      - name: Publish package to PackageMaze
        run: |
          poetry config repositories.packagemaze "${PACKAGE_MAZE_PYPI_FEED_URL%/}/legacy/"
          poetry publish --repository packagemaze
        env:
          POETRY_HTTP_BASIC_PACKAGEMAZE_USERNAME: __token__
          POETRY_HTTP_BASIC_PACKAGEMAZE_PASSWORD: ${{ steps.packagemaze-publish-token.outputs.token }}

      - name: Verify PackageMaze package installs
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          from urllib.parse import urlsplit

          host = urlsplit(os.environ["PACKAGE_MAZE_PYPI_FEED_URL"]).hostname
          if not host:
              raise SystemExit("PACKAGE_MAZE_PYPI_FEED_URL must include a host")

          netrc = Path.home() / ".netrc"
          netrc.write_text(
              f"machine {host} login __token__ password {os.environ['PACKAGE_MAZE_INSTALL_TOKEN']}\n",
              encoding="utf-8",
          )
          netrc.chmod(0o600)
          PY
          python -m venv venv/packagemaze-installation
          venv/packagemaze-installation/bin/pip install --no-deps --index-url "${PACKAGE_MAZE_PYPI_FEED_URL%/}/simple/" "${release_name}==${release_version}"
        env:
          PACKAGE_MAZE_INSTALL_TOKEN: ${{ steps.packagemaze-install-token.outputs.token }}

  install-benchmark-packagemaze-cold:
    if: ${{ github.event_name == 'workflow_dispatch' || endsWith(github.ref_name, '-install-benchmark') }}
    runs-on: ubuntu-latest
    name: Benchmark PyPI install with PackageMaze (cold)
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - id: packagemaze-token
        uses: packagemaze/setup-maze@v0.0.2
        with:
          feed: packagemaze/pypi-smoke-test
          purpose: install

      - name: Install Python dependencies with PackageMaze
        env:
          PIP_INDEX_URL: https://__token__:${{ steps.packagemaze-token.outputs.token }}@pkg.packagemaze.com/packagemaze/pypi-smoke-test/simple/
          POETRY_VIRTUALENVS_IN_PROJECT: "true"
        run: |
          set -euo pipefail
          start_ms="$(date +%s%3N)"
          python -m pip install --upgrade poetry
          poetry install
          end_ms="$(date +%s%3N)"
          elapsed_ms="$((end_ms - start_ms))"
          printf 'BENCHMARK_RESULT repo=tyminator protocol=pypi scenario=packagemaze-cold milliseconds=%s seconds=%s.%03d\n' "$elapsed_ms" "$((elapsed_ms / 1000))" "$((elapsed_ms % 1000))"

  install-benchmark-packagemaze-warm:
    if: ${{ github.event_name == 'workflow_dispatch' || endsWith(github.ref_name, '-install-benchmark') }}
    needs: install-benchmark-packagemaze-cold
    runs-on: ubuntu-latest
    name: Benchmark PyPI install with PackageMaze (warm)
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - id: packagemaze-token
        uses: packagemaze/setup-maze@v0.0.2
        with:
          feed: packagemaze/pypi-smoke-test
          purpose: install

      - name: Install Python dependencies with PackageMaze
        env:
          PIP_INDEX_URL: https://__token__:${{ steps.packagemaze-token.outputs.token }}@pkg.packagemaze.com/packagemaze/pypi-smoke-test/simple/
          POETRY_VIRTUALENVS_IN_PROJECT: "true"
        run: |
          set -euo pipefail
          start_ms="$(date +%s%3N)"
          python -m pip install --upgrade poetry
          poetry install
          end_ms="$(date +%s%3N)"
          elapsed_ms="$((end_ms - start_ms))"
          printf 'BENCHMARK_RESULT repo=tyminator protocol=pypi scenario=packagemaze-warm milliseconds=%s seconds=%s.%03d\n' "$elapsed_ms" "$((elapsed_ms / 1000))" "$((elapsed_ms % 1000))"

  install-benchmark-upstream:
    if: ${{ github.event_name == 'workflow_dispatch' || endsWith(github.ref_name, '-install-benchmark') }}
    runs-on: ubuntu-latest
    name: Benchmark PyPI install from upstream
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - name: Install Python dependencies from upstream
        env:
          PIP_INDEX_URL: https://pypi.org/simple/
          POETRY_VIRTUALENVS_IN_PROJECT: "true"
        run: |
          set -euo pipefail
          start_ms="$(date +%s%3N)"
          python -m pip install --upgrade poetry
          poetry install
          end_ms="$(date +%s%3N)"
          elapsed_ms="$((end_ms - start_ms))"
          printf 'BENCHMARK_RESULT repo=tyminator protocol=pypi scenario=upstream milliseconds=%s seconds=%s.%03d\n' "$elapsed_ms" "$((elapsed_ms / 1000))" "$((elapsed_ms % 1000))"
