name: PackageMaze publish smoke

on:
  workflow_dispatch:
  push:
    branches:
      - codex/packagemaze-oidc-publish-test

permissions:
  attestations: write
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      PACKAGE_MAZE_FEED: packagemaze/pypi-smoke-test
      PACKAGE_MAZE_LEGACY_URL: https://pkg.packagemaze.com/packagemaze/pypi-smoke-test/legacy/
      PACKAGE_NAME: tyminator
      PACKAGE_VERSION: 1.0.${{ github.run_number }}

    steps:
      - uses: actions/checkout@v6

      - uses: packagemaze/setup-maze@v0.0.1

      - id: packagemaze-install-token
        run: maze auth exchange-oidc --feed "$PACKAGE_MAZE_FEED" --purpose install --format github-output

      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - name: Configure PackageMaze PyPI install
        run: |
          python -m pip config set global.index-url "https://__token__:${PACKAGE_MAZE_TOKEN}@pkg.packagemaze.com/packagemaze/pypi-smoke-test/simple/"
        env:
          PACKAGE_MAZE_TOKEN: ${{ steps.packagemaze-install-token.outputs.token }}

      - name: Install build tools through PackageMaze
        run: python -m pip install build twine

      - name: Set smoke package version
        run: |
          python - <<'PY'
          from pathlib import Path
          import os

          path = Path("pyproject.toml")
          text = path.read_text()
          text = text.replace('version = "1.0.1"', f'version = "{os.environ["PACKAGE_VERSION"]}"')
          path.write_text(text)
          PY

      - name: Build package
        run: python -m build

      - uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-path: dist/*

      - id: packagemaze-publish-token
        run: maze auth exchange-oidc --feed "$PACKAGE_MAZE_FEED" --purpose publish --package "$PACKAGE_NAME" --format github-output

      - name: Publish package to PackageMaze
        run: python -m twine upload dist/*
        env:
          TWINE_NON_INTERACTIVE: "1"
          TWINE_PASSWORD: ${{ steps.packagemaze-publish-token.outputs.token }}
          TWINE_REPOSITORY_URL: ${{ env.PACKAGE_MAZE_LEGACY_URL }}
          TWINE_USERNAME: __token__

      - name: Install published package from PackageMaze
        run: |
          python -m venv /tmp/packagemaze-tyminator-consumer
          /tmp/packagemaze-tyminator-consumer/bin/python -m pip install "${PACKAGE_NAME}==${PACKAGE_VERSION}"
          /tmp/packagemaze-tyminator-consumer/bin/python -c "import tyminator; print('installed tyminator')"
